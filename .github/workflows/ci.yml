name: CI

on: 
  push:
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # Checked 2026-07-20: PyPy releases only support Python through 3.11.
        python-version: ["3.10", 3.11, 3.12, 3.13, 3.14, pypy3.11]
    steps:
    - uses: actions/checkout@v4
    - name: Install uv and set the python version
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: uv sync
    - name: Run tests
      shell: bash
      run: |
        uv run pytest
        if uv run which mypy; then uv run mypy ifaddr; fi
        uv run ruff format --check
    # Coveralls won't work here trivially because it can't ingest coverage.xml, so Codecov it is.
    # https://github.com/coverallsapp/github-action/issues/30
    - name: Report coverage to Codecov
      uses: codecov/codecov-action@v5
