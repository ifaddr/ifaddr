name: CI

on: 
  push:
  pull_request:

jobs:
  build:
    # Tests and coverage reporting do not need to modify repository state.
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # Checked 2026-07-20: PyPy releases only support Python through 3.11.
        python-version: ["3.10", 3.11, 3.12, 3.13, 3.14, pypy3.11]
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - name: Install uv and set the python version
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: uv sync
    - name: Run tests
      shell: bash
      run: |
        uv run pytest
        if uv run which mypy; then uv run mypy ifaddr; fi
        uv run ruff format --check
    # Coveralls won't work here trivially because it can't ingest coverage.xml, so Codecov it is.
    # https://github.com/coverallsapp/github-action/issues/30
    - name: Report coverage to Codecov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
